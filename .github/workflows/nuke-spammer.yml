name: Auto-Moderate Spammer

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  workflow_dispatch: # Manual cleanup

jobs:
  nuke_content:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.comment.user.login == 'Designgirl29' && contains(github.event.comment.body, 'riker.replit.dev/')) ||
      (github.event_name == 'issues' && github.event.issue.user.login == 'Designgirl29' && contains(github.event.issue.body, 'riker.replit.dev/'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    env:
      # Suppresses the Node deprecation warning in your workflow logs
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Handle content automation or cleanup
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const TARGET_USER = 'Designgirl29';
            const TARGET_LINK = 'riker.replit.dev/';

            // --- 1. LIVE TRIGGER: Issue Comment ---
            if (context.eventName === 'issue_comment') {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id
              });
              console.log("Successfully deleted the live spam comment.");
            } 
            
            // --- 2. LIVE TRIGGER: New Issue ---
            else if (context.eventName === 'issues') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: 'closed'
              });
              await github.rest.issues.lock({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                lock_reason: 'spam'
              });
              console.log("Successfully closed and locked the live spam issue.");
            } 
            
            // --- 3. MANUAL TRIGGER: Absolute sweeping of all threads ---
            else if (context.eventName === 'workflow_dispatch') {
              console.log(`Starting absolute historical purge across ALL repository threads...`);

              // Paginate through EVERY single issue/PR in the repository (both open and closed)
              const issuePages = github.paginate.iterator(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                per_page: 100
              });

              for await (const { data: issues } of issuePages) {
                for (const issue of issues) {
                  
                  // Task A: If the spammer created the root issue itself, lock and close it
                  if (!issue.pull_request && issue.user.login === TARGET_USER && issue.body && issue.body.includes(TARGET_LINK)) {
                    if (issue.state !== 'closed') {
                      await github.rest.issues.update({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issue.number,
                        state: 'closed'
                      });
                    }
                    if (!issue.locked) {
                      await github.rest.issues.lock({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issue.number,
                        lock_reason: 'spam'
                      });
                    }
                    console.log(`Closed & locked root spam issue #${issue.number}`);
                  }

                  // Task B: Scan inside this specific thread for the spammer's comments
                  const commentPages = github.paginate.iterator(github.rest.issues.listComments, {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    per_page: 100
                  });

                  for await (const { data: comments } of commentPages) {
                    for (const comment of comments) {
                      if (comment.user.login === TARGET_USER && comment.body && comment.body.includes(TARGET_LINK)) {
                        await github.rest.issues.deleteComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: comment.id
                        });
                        console.log(`Deleted historical comment ${comment.id} from issue #${issue.number}`);
                      }
                    }
                  }

                }
              }
              console.log("Absolute historical purge completed successfully.");
            }
