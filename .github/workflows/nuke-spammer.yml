name: Auto-Moderate Spammer

on:
  issue_comment:
    types: [created]

jobs:
  nuke_comment:
    if: github.event.comment.user.login == 'Designgirl29' && contains(github.event.comment.body, 'riker.replit.dev/')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Delete malicious comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            // 1. Delete the specific comment instantly
            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id
            });
            console.log("Successfully deleted the comment.");

            // 2. Block the user globally from the account or organization
            try {
              // Try blocking from organization first
              await github.rest.orgs.blockUser({
                org: context.repo.owner,
                username: 'Designgirl29'
              });
              console.log("Successfully blocked user from organization.");
            } catch (orgError) {
              try {
                // Fallback to blocking from user account if not an org
                await github.rest.users.block({
                  username: 'Designgirl29'
                });
                console.log("Successfully blocked user from personal account.");
              } catch (userError) {
                console.log("Could not block user. Ensure PAT_TOKEN has 'user:block' or 'admin:org' scopes.");
              }
            }
