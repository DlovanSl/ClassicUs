name: Auto-Moderate Spammer

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  workflow_dispatch: # Global manual cleanup

jobs:
  nuke_content:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && (github.event.comment.user.login == 'Designgirl29' || github.event.comment.user.login == 'techregion' || github.event.comment.user.login == 'Sarahking8') && contains(github.event.comment.body, 'riker.replit.dev/')) ||
      (github.event_name == 'issues' && (github.event.issue.user.login == 'Designgirl29' || github.event.issue.user.login == 'techregion' || github.event.issue.user.login == 'Sarahking8'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Handle content automation or cleanup
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Define the array of targeted accounts
            const TARGET_USERS = ['Designgirl29', 'techregion', 'Sarahking8'];

            // --- 1. LIVE TRIGGER: Issue Comment ---
            if (context.eventName === 'issue_comment') {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id
              });
              console.log("Successfully deleted live spam comment.");
            } 
            
            // --- 2. LIVE TRIGGER: New Issue ---
            else if (context.eventName === 'issues') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: 'closed'
              });
              await github.rest.issues.lock({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                lock_reason: 'spam'
              });
              console.log("Automatically closed and locked live new issue.");
            } 
            
            // --- 3. MANUAL TRIGGER: Nuke everything from listed users ---
            else if (context.eventName === 'workflow_dispatch') {
              console.log(`Starting bulk closure for all targeted accounts...`);

              // Iterate through each specific user to prevent endpoint mapping drops
              for (const targetUser of TARGET_USERS) {
                console.log(`Processing history for user: ${targetUser}`);

                const issuePages = github.paginate.iterator(github.rest.issues.listForRepo, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  creator: targetUser,
                  state: 'all',
                  per_page: 100
                });

                for await (const { data: issues } of issuePages) {
                  for (const issue of issues) {
                    if (issue.pull_request) continue; // Skip Pull Requests

                    // Close the target issue if it is currently open
                    if (issue.state !== 'closed') {
                      await github.rest.issues.update({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issue.number,
                        state: 'closed'
                      });
                      console.log(`Successfully closed issue #${issue.number} from ${targetUser}`);
                    }
                    
                    // Lock the thread conversation
                    if (!issue.locked) {
                      await github.rest.issues.lock({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issue.number,
                        lock_reason: 'spam'
                      });
                      console.log(`Successfully locked issue #${issue.number} from ${targetUser}`);
                    }
                  }
                }
              }
              console.log("All target issues have been successfully processed, closed, and locked.");
            }
